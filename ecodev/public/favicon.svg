<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f3a5f"/>
      <stop offset="100%" stop-color="#1f6fb2"/>
    </linearGradient>
    <linearGradient id="slash" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C45500"/>
      <stop offset="100%" stop-color="#FF7A00"/>
    </linearGradient>
  </defs>

  <!-- Background square -->
  <rect width="32" height="32" fill="url(#bg)"/>

  <!-- Orange corner slash — top right -->
  <polygon points="18,0 32,0 32,14" fill="url(#slash)" opacity="0.95"/>

  <!-- E letterform — geometric, white, optically centred -->
  <!-- Top bar -->
  <rect x="8" y="9"  width="13" height="2.5" fill="white"/>
  <!-- Middle bar (slightly shorter) -->
  <rect x="8" y="15" width="10" height="2.5" fill="white"/>
  <!-- Bottom bar -->
  <rect x="8" y="21" width="13" height="2.5" fill="white"/>
  <!-- Left stem -->
  <rect x="8" y="9"  width="2.5" height="14.5" fill="white"/>
</svg>
